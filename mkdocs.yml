site_name: Journal of the Open Research Network
site_description: A proposed Diamond Open Access overlay journal for connected and certified open research records.
site_author: Open Science Labs
site_url: https://openresearchnet.org/jorn/

docs_dir: pages
site_dir: build

theme:
  name: null
  custom_dir: theme
  language: en
  static_templates:
    - 404.html

nav:
  - Home: index.md
  - Research:
      - Published records: publications/index.md
      - Illustrative record: publications/illustrative-record/index.md
      - Search and browse: research/index.md
  - Prepare:
      - Workflow & services guide: guide/index.md
      - Readiness Check: readiness/index.md
      - Implementation levels: implementation-levels/index.md
      - Services and tools: services/index.md
      - Data and responsible access: data/index.md
      - Synthetic data: synthetic-data/index.md
      - Software and code: software/index.md
      - Figures and media: figures/index.md
  - Publish:
      - Founding pilot: pilot/index.md
      - Propose pilot work: submit/index.md
      - Aims & scope: scope/index.md
      - Author guidance: author-guidance/index.md
      - Editorial process: editorial-process/index.md
      - AI-assisted editorial triage: ai-triage/index.md
  - Review & certification:
      - Scientific review: scientific-review/index.md
      - Review communities: review-communities/index.md
      - Reviewer network: reviewers/index.md
      - Open-science review: open-science-review/index.md
      - Artifact assessment: artifact-assessment/index.md
      - JORN certification: certification/index.md
      - Evidence badges: badges/index.md
      - External assessments: external-assessments/index.md
  - Community:
      - Participate: network/index.md
      - Relationship register: community/relationships/index.md
  - About:
      - About JORN: about/index.md
      - Publishing model: about/model/index.md
      - Open Research Record: open-research-record/index.md
      - Governance: about/governance/index.md
      - Policies: about/policies/index.md
      - Sustainability: support/index.md
      - FAQ: faq/index.md

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search:
      lang: en
      separator: '[\\s\\-\\.\\_]+'

extra_css:
  - assets/styles.css

extra_javascript:
  - assets/site.js

extra:
  journal_short_name: JORN
  support_organization: Open Science Labs
  social:
    github: https://github.com/openresearchnetwork/jorn

copyright: Copyright &copy; 2026 Open Science Labs. Content available under open licenses unless otherwise noted.
